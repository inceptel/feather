<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feather — Waking up...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            max-width: 480px;
            padding: 0 24px;
        }

        .logo {
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 48px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid #222;
            border-top-color: #7c3aed;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 32px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message {
            font-size: 18px;
            color: #ccc;
            margin-bottom: 12px;
            transition: opacity 0.3s;
        }

        .sub-message {
            font-size: 14px;
            color: #666;
        }

        .error {
            color: #ef4444;
            font-size: 14px;
            margin-top: 24px;
            display: none;
        }

        .done .spinner {
            border-color: #22c55e;
            border-top-color: #22c55e;
            animation: none;
        }
    </style>
</head>
<body>
    <div class="container" id="root">
        <div class="logo">Feather</div>
        <div class="spinner" id="spinner"></div>
        <div class="message" id="message">Waking up your workspace...</div>
        <div class="sub-message" id="sub-message">This usually takes 10-15 seconds</div>
        <div class="error" id="error"></div>
    </div>

    <script>
        const username = window.location.hostname.split('.')[0];
        const msgEl = document.getElementById('message');
        const subEl = document.getElementById('sub-message');
        const errEl = document.getElementById('error');
        const root = document.getElementById('root');

        const messages = [
            { text: 'Starting container...', sub: 'Allocating resources' },
            { text: 'Loading services...', sub: 'Setting up your environment' },
            { text: 'Almost ready...', sub: 'Final health checks' },
        ];

        let msgIdx = 0;
        let wakeStarted = false;

        function setMessage(text, sub) {
            msgEl.style.opacity = '0';
            setTimeout(() => {
                msgEl.textContent = text;
                if (sub) subEl.textContent = sub;
                msgEl.style.opacity = '1';
            }, 200);
        }

        function showError(text) {
            errEl.textContent = text;
            errEl.style.display = 'block';
        }

        // Step 1: Call wake endpoint
        async function wake() {
            if (wakeStarted) return;
            wakeStarted = true;

            try {
                const resp = await fetch(`/api/wake/${username}`, { method: 'POST' });
                const data = await resp.json();

                if (!resp.ok) {
                    showError(`Failed to wake: ${data.error || 'unknown error'}`);
                    return;
                }

                if (data.status === 'already_running') {
                    window.location.reload();
                    return;
                }

                // Start polling health
                setMessage(messages[0].text, messages[0].sub);
                pollHealth();
            } catch (e) {
                showError(`Connection error: ${e.message}`);
            }
        }

        // Step 2: Poll health until ready
        let pollCount = 0;
        const maxPolls = 60; // 2min at 2s intervals

        function pollHealth() {
            pollCount++;

            // Progress messages
            if (pollCount === 3 && msgIdx < 1) { msgIdx = 1; setMessage(messages[1].text, messages[1].sub); }
            if (pollCount === 6 && msgIdx < 2) { msgIdx = 2; setMessage(messages[2].text, messages[2].sub); }

            if (pollCount > maxPolls) {
                showError('Startup is taking longer than expected. Please refresh to try again.');
                return;
            }

            fetch(`/api/health/${username}`)
                .then(r => r.json())
                .then(data => {
                    if (data.healthy) {
                        setMessage('Ready!', 'Redirecting...');
                        root.classList.add('done');
                        setTimeout(() => window.location.reload(), 500);
                    } else {
                        setTimeout(pollHealth, 2000);
                    }
                })
                .catch(() => {
                    setTimeout(pollHealth, 2000);
                });
        }

        // Start
        wake();
    </script>
</body>
</html>
